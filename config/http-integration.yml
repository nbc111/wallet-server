# 供 script/test_http.sh 启动服务，用 HTTP 验证与 engine/chain_deposit_test 一致的多链 createWallet。
# 端口 10009，避免与默认 dev 10001 冲突。
app:
  port: 10009
engines:
  - coin_name: ETH
    contract:
    contract_type:
    protocol: eth
    rpc: https://mainnet.infura.io/v3/280705d4b1d0400e838890ebd5174f23
    file: data/http-test-eth
    wallet_prefix: wallet-
    hash_prefix: hash-
    block_init: 0
    block_after_time: 60
    receipt_count: 1
    receipt_after_time: 60
    collection_after_time: 60
    collection_count: 1
    collection_max: "0"
    collection_address: "0x0000000000000000000000000000000000000001"
    confirms: 12
    recharge_notify_url: http://127.0.0.1:9/recharge
    withdraw_notify_url: http://127.0.0.1:9/withdraw
    withdraw_private_key: 61774dacba914e5675eef6c616df85c61d7c8917f56ee77f547a140f8f982d31

